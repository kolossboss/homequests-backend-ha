name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal tooling
        run: python -m pip install pyyaml

      - name: Compile Python files
        run: python -m py_compile custom_components/homequests/*.py

      - name: Validate JSON files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          files = [
              Path("custom_components/homequests/manifest.json"),
              Path("custom_components/homequests/strings.json"),
              Path("custom_components/homequests/translations/de.json"),
              Path("hacs.json"),
          ]

          for file in files:
              json.loads(file.read_text(encoding="utf-8"))
              print(f"OK: {file}")
          PY

      - name: Validate YAML services file
        run: |
          python - <<'PY'
          import yaml
          from pathlib import Path

          path = Path("custom_components/homequests/services.yaml")
          yaml.safe_load(path.read_text(encoding="utf-8"))
          print(f"OK: {path}")
          PY

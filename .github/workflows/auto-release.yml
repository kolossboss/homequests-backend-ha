name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release_if_needed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read integration version
        id: version
        run: |
          VERSION="$(python -c "import json, pathlib; print(json.loads(pathlib.Path('custom_components/homequests/manifest.json').read_text())['version'])")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          TAG="v$VERSION"

          if gh release view "$TAG" -R "$REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
            exit 0
          fi

          gh release create "$TAG" \
            -R "$REPOSITORY" \
            --target "$SHA" \
            --title "$TAG" \
            --generate-notes
